name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

      - name: Run coverage (optional)
        run: python -m pytest tests/ --cov=decoyable --cov-report=term || true

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy pre-commit

      - name: Run Ruff linting
        run: ruff check decoyable/ tests/ main.py || true

      - name: Run Black formatting check
        run: black --check decoyable/ tests/ main.py || true

      - name: Run isort check
        run: isort --check-only decoyable/ tests/ main.py || true

      - name: Run MyPy type checking
        run: mypy decoyable/ main.py --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit || true

      - name: Run Bandit security scan
        run: bandit -r decoyable/ --exclude "*/test*,*/tests/*" || true

      - name: Run pip-audit dependency check
        run: pip-audit -r requirements.txt || true

  docker:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        id: build
        continue-on-error: true
        run: docker build -t decoyable:test .

      - name: Test Docker import
        if: steps.build.outcome == 'success'
        run: docker run --rm decoyable:test python -c "import decoyable; print('✓ Import successful')" || true

      - name: Trivy - scan Docker image (OS + lib CVEs)
        id: trivy_image
        if: steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: decoyable:test
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Trivy - scan IaC (Dockerfile + docker-compose)
        id: trivy_iac
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy image SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: steps.trivy_image.outcome == 'success'
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy IaC SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: steps.trivy_iac.outcome == 'success'
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  defense:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio httpx bandit pip-audit detect-secrets

      - name: Run defense tests
        run: python -m pytest tests/defense_tests.py -v --tb=short || true

      - name: Run comprehensive security scan
        run: |
          echo "Running Bandit security scan..."
          bandit -r decoyable/ --exclude "*/test*,*/tests/*" -f json -o bandit-report.json || true
          echo "Running pip-audit dependency check..."
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
          echo "Running Detect-secrets scan..."
          detect-secrets scan --all-files > detect-secrets-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
            detect-secrets-report.json

  pre-commit:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files || true
